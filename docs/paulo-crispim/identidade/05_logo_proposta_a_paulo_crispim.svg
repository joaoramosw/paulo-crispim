<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Logo Proposta A - Paulo Crispim</title>
  <desc id="desc">Sistema de logotipo vetorial com símbolo geométrico técnico para Paulo Crispim.</desc>
  <defs>
    <linearGradient id="metalA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4F7F8"/>
      <stop offset="0.45" stop-color="#A8B2BA"/>
      <stop offset="1" stop-color="#56636D"/>
    </linearGradient>
    <linearGradient id="petrolA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A5362"/>
      <stop offset="1" stop-color="#051B22"/>
    </linearGradient>
    <style>
      .bg{fill:#050708}
      .panel{fill:#151B20}
      .word{font-family:Arial, Helvetica, sans-serif;font-weight:700;letter-spacing:22px;fill:#F4F7F8}
      .sub{font-family:Arial, Helvetica, sans-serif;font-weight:500;letter-spacing:18px;fill:#A8B2BA}
      .caption{font-family:Arial, Helvetica, sans-serif;font-size:24px;letter-spacing:3px;fill:#A8B2BA}
      .line{stroke:#35F06A;stroke-width:6;stroke-linecap:round}
      .thin{stroke:#A8B2BA;stroke-width:1.5;opacity:.45}
    </style>
  </defs>

  <rect class="bg" width="1600" height="1200"/>
  <text class="caption" x="70" y="78">PROPOSTA A - EXECUTIVA, TECNICA, ESTRUTURADA</text>

  <!-- principal fundo escuro -->
  <g transform="translate(165 150)">
    <g aria-label="símbolo principal proposta A">
      <polygon points="0,0 128,0 88,46 0,46" fill="url(#metalA)"/>
      <polygon points="0,46 88,46 88,130 0,130" fill="#7E8B94"/>
      <polygon points="88,46 178,46 178,118 112,118 88,96" fill="#E9EEF1"/>
      <polygon points="0,130 88,130 46,218 0,218" fill="#2B343A"/>
      <polygon points="88,130 156,130 104,218 46,218" fill="url(#petrolA)"/>
      <rect x="72" y="236" width="24" height="24" fill="#35F06A"/>
      <path class="thin" d="M0 0 L178 118 M0 218 L156 130"/>
    </g>
    <text class="word" x="250" y="90" font-size="72">PAULO</text>
    <text class="sub" x="252" y="166" font-size="54">CRISPIM</text>
    <line class="line" x1="252" y1="206" x2="508" y2="206"/>
    <text class="caption" x="252" y="254">Palestrante e Consultor em Lideranca Tecnica</text>
  </g>

  <!-- horizontal fundo claro -->
  <g transform="translate(165 520)">
    <rect x="-55" y="-80" width="690" height="240" rx="0" fill="#F4F7F8"/>
    <g transform="scale(.55)">
      <polygon points="0,0 128,0 88,46 0,46" fill="#151B20"/>
      <polygon points="0,46 88,46 88,130 0,130" fill="#56636D"/>
      <polygon points="88,46 178,46 178,118 112,118 88,96" fill="#A8B2BA"/>
      <polygon points="0,130 88,130 46,218 0,218" fill="#263039"/>
      <polygon points="88,130 156,130 104,218 46,218" fill="#063A46"/>
      <rect x="72" y="236" width="24" height="24" fill="#35F06A"/>
    </g>
    <text x="145" y="18" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" letter-spacing="16" fill="#151B20">PAULO</text>
    <text x="147" y="76" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="500" letter-spacing="12" fill="#56636D">CRISPIM</text>
    <line x1="148" y1="108" x2="355" y2="108" stroke="#35F06A" stroke-width="5"/>
  </g>

  <!-- reduzida -->
  <g transform="translate(925 470)">
    <rect class="panel" x="-70" y="-80" width="300" height="300"/>
    <g transform="scale(.9)">
      <polygon points="0,0 128,0 88,46 0,46" fill="url(#metalA)"/>
      <polygon points="0,46 88,46 88,130 0,130" fill="#7E8B94"/>
      <polygon points="88,46 178,46 178,118 112,118 88,96" fill="#E9EEF1"/>
      <polygon points="0,130 88,130 46,218 0,218" fill="#2B343A"/>
      <polygon points="88,130 156,130 104,218 46,218" fill="url(#petrolA)"/>
      <rect x="72" y="236" width="24" height="24" fill="#35F06A"/>
    </g>
  </g>

  <!-- monocromatica -->
  <g transform="translate(1230 465)">
    <rect x="-70" y="-75" width="300" height="300" fill="#F4F7F8"/>
    <g transform="scale(.9)" fill="#151B20">
      <polygon points="0,0 128,0 88,46 0,46"/>
      <polygon points="0,46 88,46 88,130 0,130"/>
      <polygon points="88,46 178,46 178,118 112,118 88,96"/>
      <polygon points="0,130 88,130 46,218 0,218"/>
      <polygon points="88,130 156,130 104,218 46,218"/>
      <rect x="72" y="236" width="24" height="24"/>
    </g>
  </g>

  <!-- aplicacao escura -->
  <g transform="translate(160 830)">
    <rect class="panel" width="560" height="220"/>
    <text class="caption" x="36" y="48">FUNDO ESCURO</text>
    <line x1="36" y1="78" x2="506" y2="78" stroke="#35F06A" stroke-width="2"/>
    <text class="word" x="36" y="150" font-size="46">PAULO</text>
    <text class="sub" x="38" y="196" font-size="30">CRISPIM</text>
  </g>

  <!-- aplicacao clara -->
  <g transform="translate(880 830)">
    <rect width="560" height="220" fill="#F4F7F8"/>
    <text x="36" y="48" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="3" fill="#56636D">FUNDO CLARO</text>
    <line x1="36" y1="78" x2="506" y2="78" stroke="#35F06A" stroke-width="2"/>
    <text x="36" y="150" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" letter-spacing="22" fill="#151B20">PAULO</text>
    <text x="38" y="196" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500" letter-spacing="18" fill="#56636D">CRISPIM</text>
  </g>
</svg>
