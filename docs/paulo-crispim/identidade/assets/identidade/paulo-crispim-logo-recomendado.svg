<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Logo Proposta B - Paulo Crispim</title>
  <desc id="desc">Sistema de logotipo vetorial com símbolo fluido de direção e evolução para Paulo Crispim.</desc>
  <defs>
    <linearGradient id="arcB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4F7F8"/>
      <stop offset="0.55" stop-color="#A8B2BA"/>
      <stop offset="1" stop-color="#56636D"/>
    </linearGradient>
    <linearGradient id="energyB" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#063A46"/>
      <stop offset="0.52" stop-color="#35F06A"/>
      <stop offset="1" stop-color="#F4F7F8"/>
    </linearGradient>
    <style>
      .bg{fill:#050708}
      .panel{fill:#151B20}
      .word{font-family:Arial, Helvetica, sans-serif;font-weight:700;letter-spacing:22px;fill:#F4F7F8}
      .sub{font-family:Arial, Helvetica, sans-serif;font-weight:500;letter-spacing:18px;fill:#A8B2BA}
      .caption{font-family:Arial, Helvetica, sans-serif;font-size:24px;letter-spacing:3px;fill:#A8B2BA}
      .signal{stroke:#35F06A;stroke-width:7;stroke-linecap:round;fill:none}
      .thin{stroke:#A8B2BA;stroke-width:1.5;opacity:.42;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1600" height="1200"/>
  <text class="caption" x="70" y="78">PROPOSTA B - HUMANA, INSPIRADORA, FLUIDA</text>

  <!-- principal fundo escuro -->
  <g transform="translate(175 145)">
    <g aria-label="símbolo principal proposta B">
      <path d="M202 70 C156 2 46 14 18 106 C-10 198 60 276 154 266 C215 260 254 222 274 172" fill="none" stroke="url(#arcB)" stroke-width="36" stroke-linecap="round"/>
      <path class="signal" d="M36 248 C92 190 150 156 240 138"/>
      <circle cx="260" cy="135" r="16" fill="#35F06A"/>
      <path class="thin" d="M2 294 C92 200 162 160 318 122"/>
    </g>
    <text class="word" x="380" y="112" font-size="72">PAULO</text>
    <text class="sub" x="382" y="188" font-size="54">CRISPIM</text>
    <line x1="382" y1="226" x2="638" y2="226" stroke="#35F06A" stroke-width="6" stroke-linecap="round"/>
    <text class="caption" x="382" y="274">Palestrante e Consultor em Lideranca Tecnica</text>
  </g>

  <!-- horizontal fundo claro -->
  <g transform="translate(165 535)">
    <rect x="-55" y="-90" width="735" height="240" fill="#F4F7F8"/>
    <g transform="scale(.56)">
      <path d="M202 70 C156 2 46 14 18 106 C-10 198 60 276 154 266 C215 260 254 222 274 172" fill="none" stroke="#151B20" stroke-width="36" stroke-linecap="round"/>
      <path d="M36 248 C92 190 150 156 240 138" fill="none" stroke="#35F06A" stroke-width="7" stroke-linecap="round"/>
      <circle cx="260" cy="135" r="16" fill="#35F06A"/>
    </g>
    <text x="190" y="12" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" letter-spacing="16" fill="#151B20">PAULO</text>
    <text x="192" y="70" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="500" letter-spacing="12" fill="#56636D">CRISPIM</text>
    <line x1="192" y1="104" x2="400" y2="104" stroke="#35F06A" stroke-width="5"/>
  </g>

  <!-- reduzida -->
  <g transform="translate(940 462)">
    <rect class="panel" x="-86" y="-84" width="310" height="310"/>
    <path d="M202 70 C156 2 46 14 18 106 C-10 198 60 276 154 266 C215 260 254 222 274 172" fill="none" stroke="url(#arcB)" stroke-width="34" stroke-linecap="round" transform="scale(.82)"/>
    <path d="M36 248 C92 190 150 156 240 138" fill="none" stroke="#35F06A" stroke-width="7" stroke-linecap="round" transform="scale(.82)"/>
    <circle cx="213" cy="111" r="13" fill="#35F06A"/>
  </g>

  <!-- monocromatica -->
  <g transform="translate(1248 462)">
    <rect x="-86" y="-84" width="310" height="310" fill="#F4F7F8"/>
    <path d="M202 70 C156 2 46 14 18 106 C-10 198 60 276 154 266 C215 260 254 222 274 172" fill="none" stroke="#151B20" stroke-width="34" stroke-linecap="round" transform="scale(.82)"/>
    <path d="M36 248 C92 190 150 156 240 138" fill="none" stroke="#151B20" stroke-width="7" stroke-linecap="round" transform="scale(.82)"/>
    <circle cx="213" cy="111" r="13" fill="#151B20"/>
  </g>

  <!-- aplicacao escura -->
  <g transform="translate(160 830)">
    <rect class="panel" width="560" height="220"/>
    <text class="caption" x="36" y="48">FUNDO ESCURO</text>
    <path d="M36 82 C166 118 306 78 506 96" class="thin"/>
    <text class="word" x="36" y="150" font-size="46">PAULO</text>
    <text class="sub" x="38" y="196" font-size="30">CRISPIM</text>
  </g>

  <!-- aplicacao clara -->
  <g transform="translate(880 830)">
    <rect width="560" height="220" fill="#F4F7F8"/>
    <text x="36" y="48" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="3" fill="#56636D">FUNDO CLARO</text>
    <path d="M36 82 C166 118 306 78 506 96" fill="none" stroke="#35F06A" stroke-width="2" opacity=".9"/>
    <text x="36" y="150" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" letter-spacing="22" fill="#151B20">PAULO</text>
    <text x="38" y="196" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500" letter-spacing="18" fill="#56636D">CRISPIM</text>
  </g>
</svg>
